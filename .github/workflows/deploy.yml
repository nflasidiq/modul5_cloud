name: Deploy to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t portal-mahasiswa .

      - name: Tag Docker Image
        run: |
          docker tag portal-mahasiswa:latest 243373717235.dkr.ecr.ap-southeast-1.amazonaws.com/portal-mahasiswa:latest

      - name: Push Docker Image
        run: |
          docker push 243373717235.dkr.ecr.ap-southeast-1.amazonaws.com/portal-mahasiswa:latest

      - name: Force ECS Deployment
        run: |
          aws ecs update-service \
            --cluster default \
            --service portal-cluster \
            --force-new-deployment